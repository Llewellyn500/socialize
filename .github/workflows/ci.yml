name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hosted-app:
    name: Hosted app
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Smoke-test public routes
        run: |
          npm run start > /tmp/socialize.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in $(seq 1 20); do
            if curl --silent --fail http://127.0.0.1:3000/status > /dev/null; then
              break
            fi
            sleep 1
          done
          curl --silent --fail http://127.0.0.1:3000/ > /dev/null
          curl --silent --fail http://127.0.0.1:3000/status > /dev/null
          curl --silent --fail http://127.0.0.1:3000/robots.txt > /dev/null
          curl --silent --fail http://127.0.0.1:3000/sitemap.xml > /dev/null
          curl --silent --fail http://127.0.0.1:3000/opengraph-image > /dev/null

  self-hosted-template:
    name: Self-hosted template
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: self-hosted-template

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: self-hosted-template/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Smoke-test public routes
        run: |
          npm run start > /tmp/socialize-self-hosted.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in $(seq 1 20); do
            if curl --silent --fail http://127.0.0.1:3000/ > /dev/null; then
              break
            fi
            sleep 1
          done
          curl --silent --fail http://127.0.0.1:3000/ > /dev/null
          curl --silent --fail http://127.0.0.1:3000/robots.txt > /dev/null
          curl --silent --fail http://127.0.0.1:3000/sitemap.xml > /dev/null

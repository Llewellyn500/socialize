services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
        NEXT_PUBLIC_FIREBASE_APP_CHECK_SITE_KEY: ${NEXT_PUBLIC_FIREBASE_APP_CHECK_SITE_KEY:-}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
        NEXT_PUBLIC_MEASURING_ID: ${NEXT_PUBLIC_MEASURING_ID:-}
        NEXT_PUBLIC_GITHUB_SPONSOR_URL: ${NEXT_PUBLIC_GITHUB_SPONSOR_URL:-}
        NEXT_PUBLIC_LEGAL_OPERATOR_NAME: ${NEXT_PUBLIC_LEGAL_OPERATOR_NAME:-}
        NEXT_PUBLIC_LEGAL_OPERATOR_ADDRESS: ${NEXT_PUBLIC_LEGAL_OPERATOR_ADDRESS:-}
        NEXT_PUBLIC_LEGAL_GOVERNING_LAW: ${NEXT_PUBLIC_LEGAL_GOVERNING_LAW:-}
        NEXT_PUBLIC_LEGAL_VENUE: ${NEXT_PUBLIC_LEGAL_VENUE:-}
        NEXT_PUBLIC_LEGAL_LIABILITY_CAP: ${NEXT_PUBLIC_LEGAL_LIABILITY_CAP:-}
        NEXT_PUBLIC_LEGAL_EFFECTIVE_DATE: ${NEXT_PUBLIC_LEGAL_EFFECTIVE_DATE:-}
        NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-}
        NEXT_PUBLIC_SECURITY_EMAIL: ${NEXT_PUBLIC_SECURITY_EMAIL:-}
        NEXT_PUBLIC_PRIVACY_EMAIL: ${NEXT_PUBLIC_PRIVACY_EMAIL:-}
        NEXT_PUBLIC_SAFETY_EMAIL: ${NEXT_PUBLIC_SAFETY_EMAIL:-}
        NEXT_PUBLIC_LEGAL_EMAIL: ${NEXT_PUBLIC_LEGAL_EMAIL:-}
        NEXT_PUBLIC_SPONSORS_EMAIL: ${NEXT_PUBLIC_SPONSORS_EMAIL:-}
    image: socialize-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
      NEXT_PUBLIC_FIREBASE_APP_CHECK_SITE_KEY: ${NEXT_PUBLIC_FIREBASE_APP_CHECK_SITE_KEY:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
      NEXT_PUBLIC_MEASURING_ID: ${NEXT_PUBLIC_MEASURING_ID:-}
      NEXT_PUBLIC_GITHUB_SPONSOR_URL: ${NEXT_PUBLIC_GITHUB_SPONSOR_URL:-}
      NEXT_PUBLIC_LEGAL_OPERATOR_NAME: ${NEXT_PUBLIC_LEGAL_OPERATOR_NAME:-}
      NEXT_PUBLIC_LEGAL_OPERATOR_ADDRESS: ${NEXT_PUBLIC_LEGAL_OPERATOR_ADDRESS:-}
      NEXT_PUBLIC_LEGAL_GOVERNING_LAW: ${NEXT_PUBLIC_LEGAL_GOVERNING_LAW:-}
      NEXT_PUBLIC_LEGAL_VENUE: ${NEXT_PUBLIC_LEGAL_VENUE:-}
      NEXT_PUBLIC_LEGAL_LIABILITY_CAP: ${NEXT_PUBLIC_LEGAL_LIABILITY_CAP:-}
      NEXT_PUBLIC_LEGAL_EFFECTIVE_DATE: ${NEXT_PUBLIC_LEGAL_EFFECTIVE_DATE:-}
      NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-}
      NEXT_PUBLIC_SECURITY_EMAIL: ${NEXT_PUBLIC_SECURITY_EMAIL:-}
      NEXT_PUBLIC_PRIVACY_EMAIL: ${NEXT_PUBLIC_PRIVACY_EMAIL:-}
      NEXT_PUBLIC_SAFETY_EMAIL: ${NEXT_PUBLIC_SAFETY_EMAIL:-}
      NEXT_PUBLIC_LEGAL_EMAIL: ${NEXT_PUBLIC_LEGAL_EMAIL:-}
      NEXT_PUBLIC_SPONSORS_EMAIL: ${NEXT_PUBLIC_SPONSORS_EMAIL:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      FIREBASE_APP_CHECK_ENFORCED: ${FIREBASE_APP_CHECK_ENFORCED:-false}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/status').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
